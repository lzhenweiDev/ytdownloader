<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Downloader - Render</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 650px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }
        h1 { text-align: center; margin-bottom: 5px; font-size: 28px; }
        h1 span { color: #ff0000; }
        .subtitle { text-align: center; color: #888; font-size: 13px; margin-bottom: 20px; }
        
        .status {
            background: #111;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
        }
        .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .green { background: #4caf50; }
        .red { background: #ff4444; }
        
        input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #333;
            border-radius: 10px;
            background: #111;
            color: #fff;
            font-size: 14px;
            outline: none;
            margin-bottom: 12px;
            transition: border-color 0.3s;
        }
        input:focus { border-color: #ff0000; }
        input::placeholder { color: #666; }
        
        button {
            width: 100%;
            padding: 14px;
            background: #ff0000;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 8px;
            transition: all 0.3s;
        }
        button:hover:not(:disabled) { background: #cc0000; }
        button:disabled { background: #444; cursor: not-allowed; }
        
        .msg {
            padding: 12px;
            border-radius: 8px;
            margin: 12px 0;
            font-size: 14px;
            display: none;
        }
        .msg.show { display: block; }
        .msg.error { background: rgba(255,0,0,0.1); border: 1px solid rgba(255,0,0,0.3); color: #ff4444; }
        .msg.success { background: rgba(76,175,80,0.1); border: 1px solid rgba(76,175,80,0.3); color: #4caf50; }
        .msg.info { background: rgba(33,150,243,0.1); border: 1px solid rgba(33,150,243,0.3); color: #2196f3; }
        
        .result { display: none; margin-top: 15px; }
        .result.show { display: block; }
        
        .video-card {
            background: #111;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .video-card .vtitle { font-size: 16px; font-weight: 600; margin-bottom: 5px; }
        .video-card .vmeta { font-size: 13px; color: #888; }
        
        .format-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 8px;
            margin-top: 10px;
        }
        .fmt-btn {
            background: #111;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
        }
        .fmt-btn:hover { border-color: #ff0000; background: #1a0000; transform: translateY(-2px); }
        .fmt-btn .q { font-size: 18px; font-weight: 700; display: block; }
        .fmt-btn .d { font-size: 11px; color: #888; display: block; margin-top: 3px; }
        .fmt-btn .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            margin-top: 5px;
        }
        .badge-v { background: rgba(255,0,0,0.2); color: #ff4444; }
        .badge-a { background: rgba(33,150,243,0.2); color: #2196f3; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⬇️ YouTube <span>Downloader</span></h1>
        <p class="subtitle">Render Cloud • Funktioniert!</p>
        
        <div class="status">
            <div class="dot red" id="statusDot"></div>
            <span id="statusText">Prüfe Server...</span>
            <button onclick="check()" style="width:auto;padding:6px 12px;font-size:11px;margin-left:auto;">🔄</button>
        </div>
        
        <input 
            type="text" 
            id="urlInput" 
            placeholder="YouTube-URL einfügen..."
            autocomplete="off"
        />
        <button id="fetchBtn" onclick="load()" disabled>🔍 Formate laden</button>
        
        <div id="msgBox"></div>
        <div class="result" id="result"></div>
    </div>

    <script>
        const API = window.location.origin;
        
        async function check() {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            const btn = document.getElementById('fetchBtn');
            
            dot.className = 'dot red';
            text.textContent = 'Prüfe...';
            
            try {
                const r = await fetch(`${API}/ping`);
                if (r.ok) {
                    dot.className = 'dot green';
                    text.textContent = '✅ Server bereit!';
                    btn.disabled = false;
                }
            } catch {
                dot.className = 'dot red';
                text.textContent = '❌ Server nicht erreichbar';
                btn.disabled = true;
            }
        }
        
        async function load() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) return msg('❌ Bitte URL eingeben', 'error');
            
            const btn = document.getElementById('fetchBtn');
            btn.disabled = true;
            btn.textContent = '⏳...';
            msg('🔍 Suche Formate...', 'info');
            
            try {
                const r = await fetch(`${API}/formats`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url})
                });
                const d = await r.json();
                
                if (d.error) throw new Error(d.error);
                
                let html = `
                    <div class="video-card">
                        <div class="vtitle">📺 ${esc(d.title)}</div>
                        <div class="vmeta">
                            👤 ${esc(d.uploader || 'Unbekannt')} · 
                            ⏱️ ${Math.floor((d.duration||0)/60)}:${String((d.duration||0)%60).padStart(2,'0')}
                        </div>
                    </div>
                    <div class="format-grid">
                `;
                
                d.formats.forEach(f => {
                    const type = f.type === 'audio' ? '🎵 Audio' : '🎬 Video';
                    const badge = f.type === 'audio' ? 'badge-a' : 'badge-v';
                    html += `
                        <div class="fmt-btn" onclick="download('${encodeURIComponent(f.id)}')">
                            <span class="q">${f.quality}</span>
                            <span class="d">${f.size}</span>
                            <span class="badge ${badge}">${type}</span>
                        </div>
                    `;
                });
                
                html += '</div>';
                
                document.getElementById('result').innerHTML = html;
                document.getElementById('result').classList.add('show');
                msg(`✅ ${d.formats.length} Formate gefunden`, 'success');
                
            } catch (e) {
                msg(`❌ ${e.message}`, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '🔍 Formate laden';
            }
        }
        
        async function download(formatUrl) {
            msg('⬇️ Downloade...', 'info');
            
            try {
                const r = await fetch(`${API}/download`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({format_id: decodeURIComponent(formatUrl)})
                });
                
                if (!r.ok) {
                    const e = await r.json();
                    throw new Error(e.error);
                }
                
                const blob = await r.blob();
                const u = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = u;
                a.download = 'video.mp4';
                a.click();
                URL.revokeObjectURL(u);
                
                msg('✅ Download fertig!', 'success');
                
            } catch (e) {
                msg(`❌ ${e.message}`, 'error');
            }
        }
        
        function msg(text, type) {
            const box = document.getElementById('msgBox');
            box.innerHTML = `<div class="msg ${type} show">${text}</div>`;
            if (type === 'success') setTimeout(() => box.innerHTML = '', 4000);
        }
        
        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }
        
        document.getElementById('urlInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') load();
        });
        
        check();
    </script>
</body>
</html>
